name: Update Cafe24 Data

on:
  schedule:
    # 매일 오전 6시, 오후 1시, 오후 9시 (KST = UTC+9)
    - cron: '0 21 * * *'   # KST 06:00
    - cron: '0 4 * * *'    # KST 13:00
    - cron: '0 12 * * *'   # KST 21:00
  workflow_dispatch:
    inputs:
      days_back:
        description: '수집 기간 (일)'
        required: false
        default: '30'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Cafe24 collector
        env:
          CI: "true"
          CAFE24_MALL_ID: ${{ secrets.CAFE24_MALL_ID }}
          CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
          CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
          CAFE24_ACCESS_TOKEN: ${{ secrets.CAFE24_ACCESS_TOKEN }}
          CAFE24_REFRESH_TOKEN: ${{ secrets.CAFE24_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_USER: bbagio-bit
          GH_REPO: bbagio-dashboard
        run: python cafe24_collector.py

      - name: Commit updated tokens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cafe24_tokens.json cafe24_latest.json || true
          git diff --staged --quiet || git commit -m "[자동] Cafe24 토큰/데이터 업데이트"
          git push || true
